version: "3.9"

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - downloads:/app/downloads
    - logs:/app/logs

services:
  api:
    <<: *common
    target: base
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    <<: *common
    target: worker
    deploy:
      replicas: 2          # scale workers independently of the API
    environment:
      WORKER_CONCURRENCY: "2"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  downloads:
  logs:
  redis_data: